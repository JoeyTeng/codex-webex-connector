name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked

  sidecar:
    name: Webex sidecar (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
    defaults:
      run:
        working-directory: sidecars/webex-ws-sidecar

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.15.0

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check JavaScript syntax
        run: node --check index.cjs

      - name: Check Webex package imports
        run: |
          node <<'EOF'
          const modules = [
            "@webex/internal-plugin-device",
            "@webex/plugin-logger",
            "@webex/plugin-rooms",
            "@webex/plugin-people",
            "@webex/plugin-messages",
            "@webex/plugin-attachment-actions",
          ];
          for (const moduleName of modules) {
            require(moduleName);
          }
          const WebexCore = require("@webex/webex-core").default;
          if (typeof WebexCore !== "function") {
            throw new Error("@webex/webex-core default export is not a constructor");
          }
          EOF
