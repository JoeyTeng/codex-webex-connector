name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-24.04
          - platform: macos
            os: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked

  sidecar:
    name: Webex sidecar (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-24.04
          - platform: macos
            os: macos-15
    defaults:
      run:
        working-directory: sidecars/webex-ws-sidecar

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.15.0

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.15.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Webex sidecar
        run: pnpm run check

  rust-required-check-compat:
    name: Rust (${{ matrix.os }})
    runs-on: ubuntu-24.04
    needs: rust
    if: ${{ always() }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15

    steps:
      - name: Check Rust matrix result
        run: test "${{ needs.rust.result }}" = "success"

  sidecar-required-check-compat:
    name: Webex sidecar (${{ matrix.os }})
    runs-on: ubuntu-24.04
    needs: sidecar
    if: ${{ always() }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15

    steps:
      - name: Check Webex sidecar matrix result
        run: test "${{ needs.sidecar.result }}" = "success"
